<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FeelGood — 뇌과학 기반 맞춤 교육</title>
<!-- Meta Pixel Code -->

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; min-height:100%; background:#f1f3fa; }
#loader {
  position:fixed; inset:0; z-index:9999;
  background:#0d1528;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:20px;
  transition:opacity 0.4s;
}
#loader.hide { opacity:0; pointer-events:none; }
.ld-logo { font-size:36px; font-weight:900; font-family:Georgia,serif; color:#00b09b; }
.ld-bar-wrap { width:220px; height:3px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; }
.ld-bar { height:100%; background:linear-gradient(90deg,#00b09b,#4fc3f7); width:0; animation:lp 2.5s ease forwards; }
@keyframes lp { 0%{width:0} 70%{width:85%} 100%{width:100%} }
.ld-txt { font-size:13px; color:rgba(255,255,255,0.35); font-family:sans-serif; }
#page-root { display:none; }
.kg-btn {
  display:inline-flex !important; align-items:center !important; gap:8px !important;
  padding:12px 26px !important; border-radius:50px !important;
  background:linear-gradient(135deg,#f5a623,#e08b00) !important;
  color:#fff !important; font-size:15px !important; font-weight:700 !important;
  text-decoration:none !important; box-shadow:0 4px 18px rgba(245,166,35,0.45) !important;
  cursor:pointer !important; border:none !important;
  letter-spacing:-0.3px !important; white-space:nowrap !important;
  font-family:inherit !important; vertical-align:middle !important;
  transition:transform 0.2s, box-shadow 0.2s !important;
}
.kg-btn:hover { transform:translateY(-2px) !important; box-shadow:0 8px 28px rgba(245,166,35,0.6) !important; }
</style>
</head>
<body>
<div id="loader">
  <div class="ld-logo">FeelGood</div>
  <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
  <div class="ld-txt">페이지 로딩 중...</div>
</div>
<div id="page-root"></div>
<script>

'use strict';
const DEMO_URL   = 'https://goldensge22-design.github.io/feelgood-app/brainfit_v1%20(7).html';
const SOURCE_URL = 'https://goldensge22-design.github.io/feelgood-app/feelgood_proposal_v4.html';
const BASE_HREF  = 'https://goldensge22-design.github.io/feelgood-app/';

function hideLoader() {
  const ld = document.getElementById('loader');
  ld.classList.add('hide');
  setTimeout(() => { ld.style.display = 'none'; }, 450);
}

function makeKinderBtn() {
  const a = document.createElement('a');
  a.href = DEMO_URL;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.className = 'kg-btn';
  a.innerHTML = '🏫 유치원용 체험하기';
  return a;
}

// ── 핵심 DOM 조작 함수 ──────────────────────────────────────────
function patchDOM(root) {
  let changed = false;

  // 1) 텍스트 교체: 학교 제안 관련 텍스트 → "교육기관 제안"
  const TEXT_MAP = [
    ['학교 제안서 보기', '교육기관 제안'],
    ['학교 제안서',     '교육기관 제안'],
    ['학교 제안',       '교육기관 제안'],
    ['제안서 보기',     '교육기관 제안'],
  ];
  root.querySelectorAll('a, button, span, div, p, h1, h2, h3, h4, h5, h6, li').forEach(el => {
    TEXT_MAP.forEach(([from, to]) => {
      if (el.childElementCount === 0 && el.textContent.includes(from)) {
        el.textContent = el.textContent.replace(from, to);
        changed = true;
      }
      if (el.innerHTML && el.innerHTML.includes(from)) {
        el.innerHTML = el.innerHTML.replace(from, to);
        changed = true;
      }
    });
  });

  // 2) 모든 버튼/링크 수집
  const allBtns    = Array.from(root.querySelectorAll('a, button'));
  const teacherBtns = allBtns.filter(el => el.textContent.trim().includes('MindCompass 교사'));
  const studentBtns = allBtns.filter(el => el.textContent.trim().includes('BrainMap 학생'));

  // "BrainMap 학생" 버튼을 기준으로 조상 중 "BRAINMAP" 텍스트를 포함하는 섹션을 찾음
  function findBrainmapSection(btn) {
    let el = btn?.parentElement;
    for (let i = 0; i < 8 && el; i++) {
      if (el.textContent.includes('BRAINMAP') || el.textContent.includes('BrainMap')) return el;
      el = el.parentElement;
    }
    return null;
  }
  const brainmapSection = findBrainmapSection(studentBtns[0]);

  teacherBtns.forEach(tBtn => {
    const inSection = brainmapSection && brainmapSection.contains(tBtn);
    if (!inSection) {
      // 버튼 혼자 있는 wrapper div/p도 함께 정리 (빈 공간 방지)
      const parent = tBtn.parentElement;
      tBtn.remove();
      // 부모가 버튼만 단독으로 갖고 있던 경우 부모도 제거
      if (parent && parent.children.length === 0 && parent !== root) {
        parent.remove();
      }
      changed = true;
    }
  });

  const bottomStudent = studentBtns[0];
  const remainingTeacherBtns = Array.from(root.querySelectorAll('a, button'))
    .filter(el => el.textContent.trim().includes('MindCompass 교사'));
  const bottomTeacher = remainingTeacherBtns[0];

  if (bottomStudent && bottomTeacher) {
    const alreadyHasKinder = Array.from((brainmapSection || bottomStudent.parentElement)
      .querySelectorAll('a,button'))
      .some(el => el.textContent.includes('유치원용 체험하기'));
    if (!alreadyHasKinder) {
      const newBtn = makeKinderBtn();
      bottomTeacher.parentElement.insertBefore(newBtn, bottomTeacher);
      changed = true;
    }
  }

  return changed;
}

function rerunScripts(root) {
  root.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    if (old.src) { s.src = old.src; s.async = false; }
    else { try { s.textContent = old.textContent; } catch(e){} }
    if (old.parentNode) old.parentNode.replaceChild(s, old);
  });
}

function showFallback(root) {
  hideLoader();
  root.style.display = 'block';
  root.innerHTML = `
<div style="min-height:100vh;background:linear-gradient(135deg,#0d1528,#1a1040 50%,#0d2030);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:48px 24px;font-family:'Apple SD Gothic Neo',Malgun Gothic,sans-serif">
  <div style="font-size:52px">📄</div>
  <div style="text-align:center">
    <div style="font-size:12px;color:#00b09b;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-family:monospace">FEELGOOD PLATFORM</div>
    <h1 style="font-size:26px;font-weight:900;color:#fff;margin-bottom:14px;line-height:1.35">아래 버튼으로 직접 접근해 주세요</h1>
    <p style="font-size:15px;color:rgba(255,255,255,0.5);line-height:1.8;max-width:460px;margin:0 auto">보안 정책으로 인해 이 파일에서 직접 원본을 불러올 수 없습니다.<br>각 버튼을 클릭해 새 탭에서 확인해주세요.</p>
  </div>
  <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px">
    <a href="${SOURCE_URL}" target="_blank" rel="noopener"
       style="display:inline-flex;align-items:center;gap:8px;padding:14px 30px;border-radius:50px;background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;font-size:15px;font-weight:700;text-decoration:none;box-shadow:0 6px 20px rgba(99,102,241,0.4)">
      📄 제안서 열기
    </a>
    <a href="${DEMO_URL}" target="_blank" rel="noopener"
       style="display:inline-flex;align-items:center;gap:8px;padding:14px 30px;border-radius:50px;background:linear-gradient(135deg,#f5a623,#e08b00);color:#fff;font-size:15px;font-weight:700;text-decoration:none;box-shadow:0 6px 20px rgba(245,166,35,0.4)">
      🏫 유치원용 체험하기
    </a>
    <a href="${DEMO_URL}" target="_blank" rel="noopener"
       style="display:inline-flex;align-items:center;gap:8px;padding:14px 30px;border-radius:50px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);color:#fff;font-size:15px;font-weight:600;text-decoration:none">
      🚀 BrainMap 학생 체험하기
    </a>
  </div>
</div>`;
}

async function main() {
  const root = document.getElementById('page-root');
  try {
    const resp = await fetch(SOURCE_URL, { cache: 'no-cache' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    let html = await resp.text();

    // base href 주입
    html = html.replace(/(<head[^>]*>)/i, '$1\n<base href="' + BASE_HREF + '">');

    root.innerHTML = html;
    root.style.display = 'block';
    rerunScripts(root);

    // DOM 패치 시도 (렌더링 후 약간 딜레이)
    if (!patchDOM(root)) {
      setTimeout(() => {
        if (!patchDOM(root)) {
          let tries = 0;
          const obs = new MutationObserver(() => {
            if (patchDOM(root) || ++tries > 30) obs.disconnect();
          });
          obs.observe(root, { childList:true, subtree:true });
          setTimeout(() => obs.disconnect(), 8000);
        }
      }, 800);
    }

    hideLoader();
  } catch(err) {
    console.error('[FeelGood] 로드 실패:', err.message);
    showFallback(root);
  }
}
main();
setTimeout(() => {
  if (typeof fbq === 'function') {
    fbq('track', 'PageView');
  }
}, 2000); 
</script>
</body>
</html>
